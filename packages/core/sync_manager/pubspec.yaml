name: sync_manager
description: "A new Flutter package project."
version: 0.0.1
publish_to: "none"
resolution: workspace
environment:
  sdk: ^3.10.9
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  get_it: ^9.2.1
  injectable: ^3.0.0
  connectivity_plus: ^7.1.1
  dartz: ^0.10.1
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  firebase_storage: ^13.4.1
  cloud_firestore: ^6.4.1
  flutter_dotenv: ^6.0.1

  cars_market:
    path: ../../../../cars_market
  error_handler:
    path: ../error_handler
  remote:
    path: ../remote
  storage:
    path: ../storage
  domain:
    path: ../domain
  constants:
    path: ../constants
  data:
    path: ../data
  path: ^1.9.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  injectable_generator: ^3.0.0
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
